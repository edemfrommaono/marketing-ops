services:
  db:
    image: postgres:15-alpine
    container_name: mops_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mops_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mops_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-mops_db}
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/db:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mops_redis
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: mops_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_admin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker-data/minio:/data
    restart: unless-stopped

  filestorage:
    image: nginx:alpine
    container_name: mops_filestorage
    ports:
      - "8080:80"
    volumes:
      - storage_volume:/usr/share/nginx/html/uploads
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mops_web
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mops_admin}:${POSTGRES_PASSWORD:-mops_secure_password}@db:5432/${POSTGRES_DB:-mops_db}?schema=public
      - REDIS_URL=redis://redis:6379
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/mnt/storage
      - STORAGE_PUBLIC_URL=http://localhost:8080/uploads
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minio_admin_secret}
      - S3_BUCKET_NAME=mops-storage
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=changeme_in_production_super_secret_key
    volumes:
      - ./web:/app
      - /app/node_modules
      - storage_volume:/mnt/storage
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mops_worker
    command: npm run worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mops_admin}:${POSTGRES_PASSWORD:-mops_secure_password}@db:5432/${POSTGRES_DB:-mops_db}?schema=public
      - REDIS_URL=redis://redis:6379
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/mnt/storage
      - STORAGE_PUBLIC_URL=http://localhost:8080/uploads
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minio_admin_secret}
      - S3_BUCKET_NAME=mops-storage
    volumes:
      - ./web:/app
      - /app/node_modules
      - storage_volume:/mnt/storage
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  storage_volume:
